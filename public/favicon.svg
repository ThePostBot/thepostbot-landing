<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#ffffff"/>
  <!-- Border -->
  <rect width="100" height="100" rx="18" fill="none" stroke="#E8E6E1" stroke-width="3"/>
  
  <!-- T - dark -->
  <text x="7" y="68" font-family="Arial,sans-serif" font-weight="800" font-size="52" fill="rgba(0,0,0,0.85)">T</text>
  <!-- P - LinkedIn blue -->
  <text x="34" y="68" font-family="Arial,sans-serif" font-weight="800" font-size="52" fill="#0A66C2">P</text>
  <!-- B - dark -->
  <text x="63" y="68" font-family="Arial,sans-serif" font-weight="800" font-size="52" fill="rgba(0,0,0,0.85)">B</text>
</svg>
